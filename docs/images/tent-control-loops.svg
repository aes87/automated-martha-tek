  <text x="480.0" y="253.0" text-anchor="middle" class="node-sub">hits 950 ppm</text>
  <rect x="380.0" y="410.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="rgba(245,239,224,0.18)" stroke-width="1.8"/>
  <text x="480.0" y="445.0" text-anchor="middle" class="node-title">CO2 flushes out</text>
  <text x="480.0" y="467.0" text-anchor="middle" class="node-sub">~1–2 min</text>
  <rect x="130.0" y="410.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="rgba(245,239,224,0.18)" stroke-width="1.8"/>
  <text x="230.0" y="445.0" text-anchor="middle" class="node-title">Fans OFF</text>
  <text x="230.0" y="467.0" text-anchor="middle" class="node-sub">drops to 650 ppm</text>
  <rect x="750.0" y="190.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="rgba(245,239,224,0.18)" stroke-width="1.8"/>
  <text x="850.0" y="225.0" text-anchor="middle" class="node-title">RH drops</text>
  <text x="850.0" y="247.0" text-anchor="middle" class="node-sub">FAE exits humid air</text>
  <rect x="1000.0" y="190.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="#e6a562" stroke-width="2.0"/>
