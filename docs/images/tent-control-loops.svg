  <text x="1100.0" y="208.0" text-anchor="middle" class="node-type">TRIGGER</text>
  <text x="1100.0" y="231.0" text-anchor="middle" class="node-title">Fogger + tub fan</text>
  <text x="1100.0" y="253.0" text-anchor="middle" class="node-sub">below 85%</text>
  <rect x="1000.0" y="410.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="rgba(245,239,224,0.18)" stroke-width="1.8"/>
  <text x="1100.0" y="445.0" text-anchor="middle" class="node-title">Tent refills</text>
  <text x="1100.0" y="467.0" text-anchor="middle" class="node-sub">with fog</text>
  <rect x="750.0" y="410.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="rgba(245,239,224,0.18)" stroke-width="1.8"/>
  <text x="850.0" y="445.0" text-anchor="middle" class="node-title">Fogger OFF</text>
  <text x="850.0" y="467.0" text-anchor="middle" class="node-sub">hits 87%</text>
  <rect x="567.0" y="211.0" width="196" height="20" rx="6" fill="#15151e" opacity="1"/>
  <text x="665.0" y="225.0" text-anchor="middle" class="arrow-label">FAE also removes humid air</text>
  <line x1="40.0" y1="560.0" x2="70.0" y2="560.0" stroke="#c9c5b6" stroke-width="1.6" marker-end="url(#arrowA)"/>
  <text x="80.0" y="564.0" class="legend">CO2 loop (hysteresis 650–950 ppm)</text>
  <line x1="40.0" y1="582.0" x2="70.0" y2="582.0" stroke="#6fd1b4" stroke-width="1.6" marker-end="url(#arrowB)"/>
  <text x="80.0" y="586.0" class="legend">Humidity loop (hysteresis 85–87%)</text>
  <line x1="40.0" y1="604.0" x2="70.0" y2="604.0" stroke="#e6a562" stroke-width="1.6" marker-end="url(#arrowG)"/>
  <text x="80.0" y="608.0" class="legend">Cross-coupling</text>
</svg>