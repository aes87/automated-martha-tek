  <text x="230.0" y="247.0" text-anchor="middle" class="node-sub">blocks respire</text>
  <rect x="380.0" y="190.0" width="200.0" height="70.0" rx="8.0" fill="#24222f" stroke="#e6a562" stroke-width="2.0"/>
  <rect x="386.0" y="196.0" width="188.0" height="58.0" rx="5.0" fill="none" stroke="#e6a562" stroke-width="1.2" opacity="0.65"/>
  <text x="480.0" y="208.0" text-anchor="middle" class="node-type">TRIGGER</text>
