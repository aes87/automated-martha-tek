  <rect width="1280.0" height="264.0" fill="url(#editorialTopGlow)"/>
  <rect width="1280.0" height="480.0" filter="url(#editorialGrain)" opacity="0.6"/>
  <text x="640.0" y="56" text-anchor="middle" class="title">Mains Load Wiring</text>
