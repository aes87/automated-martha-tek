  <line x1="40.0" y1="440.0" x2="70.0" y2="440.0" stroke="#c9c5b6" stroke-width="1.6" marker-end="url(#arrowA)"/>
  <text x="80.0" y="444.0" class="legend">Switched Hot — routed through relay contact</text>
  <line x1="40.0" y1="462.0" x2="70.0" y2="462.0" stroke="#6fd1b4" stroke-width="1.6" marker-end="url(#arrowB)"/>
  <text x="80.0" y="466.0" class="legend">Neutral — shared bus, never switched</text>
  <line x1="40.0" y1="484.0" x2="70.0" y2="484.0" stroke="#c9c5b6" stroke-width="1.6" marker-end="url(#arrowA)"/>
  <text x="80.0" y="488.0" class="legend">Earth — optional, only for earthed loads</text>
