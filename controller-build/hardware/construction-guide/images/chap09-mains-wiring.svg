  <text x="190.0" y="402.0" text-anchor="middle" class="node-sub">Green / Bare</text>
  <rect x="840.0" y="100.0" width="300.0" height="80.0" rx="8.0" fill="#24222f" stroke="rgba(245,239,224,0.18)" stroke-width="2.0"/>
